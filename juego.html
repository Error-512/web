<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adiviná el Famoso</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.card{
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    border-radius:20px;
    padding:30px;
    width:320px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,0.4);
}

h1{font-size:24px;}

.timer{
    width:80px;
    height:80px;
    border-radius:50%;
    border:6px solid #00d4ff;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:15px auto;
    font-size:22px;
    font-weight:bold;
}

.pistas{
    margin:20px 0;
    font-size:18px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:16px;
    text-align:center;
    outline:none;
}

button{
    margin-top:10px;
    padding:10px;
    width:100%;
    border:none;
    border-radius:10px;
    background:#00d4ff;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

.resultado{
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="card" id="game">
    <h1>🇦🇷 Adiviná el Famoso</h1>

    <div class="timer" id="timer">60</div>

    <div class="pistas" id="pistas"></div>

    <input id="input" placeholder="Escribí el nombre...">
    <button onclick="adivinar()">Adivinar</button>

    <div class="resultado" id="resultado"></div>
</div>

<script>
// 📦 FAMOSOS
const famosos = [
{nombre:"lionel messi", pistas:["futbolista","campeón del mundo","rosario","10","inter miami"]},
{nombre:"diego maradona", pistas:["mano de dios","napoli","10","leyenda","fútbol"]},
{nombre:"ricardo fort", pistas:["empresario","mediático","miami","chocolate","show"]},
{nombre:"mirtha legrand", pistas:["conductora","almuerzos","tv","diva","años"]},
{nombre:"tinelli", pistas:["conductor","showmatch","baile","tv","humor"]},
{nombre:"cfk", pistas:["política","presidenta","kirchner","peronismo","senado"]},
{nombre:"milei", pistas:["economista","presidente","peluca","liberal","política"]},
{nombre:"bizarrap", pistas:["productor","bzrp","música","gorro","sessions"]},
{nombre:"nicki nicole", pistas:["cantante","trap","rosario","joven","música"]},
{nombre:"duki", pistas:["trap","rap","argentina","freestyle","música"]},
{nombre:"wos", pistas:["rap","redbull","freestyle","rock","música"]},
{nombre:"el kun aguero", pistas:["fútbol","streamer","twitch","city","gol"]},
{nombre:"tevez", pistas:["boca","apache","china","delantero","fútbol"]},
{nombre:"paulo dybala", pistas:["roma","selección","celebración","cara","fútbol"]},
{nombre:"tini", pistas:["cantante","violetta","pop","actriz","joven"]},
{nombre:"lali", pistas:["pop","actriz","series","música","argentina"]},
{nombre:"franco colapinto", pistas:["f1","piloto","joven","automovilismo","deporte"]},
{nombre:"susana gimenez", pistas:["conductora","diva","tv","show","entrevistas"]},
{nombre:"guido kazcka", pistas:["tv","juegos","humor","programa","conductor"]},
{nombre:"darin", pistas:["actor","cine","películas","argentina","famoso"]},
{nombre:"brandoni", pistas:["actor","teatro","política","histórico","cine"]},
{nombre:"spinetta", pistas:["rock","poeta","guitarra","leyenda","música"]},
{nombre:"charly garcia", pistas:["rock","bigote","teclado","genio","música"]},
{nombre:"cerati", pistas:["soda stereo","rock","voz","guitarra","música"]},
{nombre:"ricky maravilla", pistas:["cumbia","fiesta","baile","popular","cantante"]}
];

// 📅 diario
function getFamoso(){
    const hoy = new Date().toDateString();
    let suma = 0;
    for(let i=0;i<hoy.length;i++) suma += hoy.charCodeAt(i);
    return famosos[suma % famosos.length];
}

const hoy = new Date().toDateString();
const data = getFamoso();

// 💾 estado guardado COMPLETO
let estado = JSON.parse(localStorage.getItem("famosoEstado")) || {};

if(estado.fecha === hoy){
    if(estado.terminado){
        mostrarFinal(estado.gano);
    } else {
        iniciarJuego(estado.tiempoRestante);
    }
} else {
    estado = {fecha:hoy, tiempoRestante:60, terminado:false};
    localStorage.setItem("famosoEstado", JSON.stringify(estado));
    iniciarJuego(60);
}

// 🎯 iniciar
function iniciarJuego(tiempoInicial){
    document.getElementById("pistas").innerText = data.pistas.join(" • ");

    let tiempo = tiempoInicial;
    const timerEl = document.getElementById("timer");

    const intervalo = setInterval(()=>{
        tiempo--;
        estado.tiempoRestante = tiempo;
        localStorage.setItem("famosoEstado", JSON.stringify(estado));

        timerEl.innerText = tiempo;

        if(tiempo <= 10) timerEl.style.borderColor = "red";

        if(tiempo <= 0){
            clearInterval(intervalo);
            terminar(false);
        }
    },1000);

    window.adivinar = function(){
        const val = document.getElementById("input").value.toLowerCase().trim();

        if(val === data.nombre){
            clearInterval(intervalo);
            terminar(true);
        } else {
            document.getElementById("resultado").innerText = "❌ Incorrecto";
        }
    }

    document.getElementById("input").addEventListener("keypress", function(e){
        if(e.key === "Enter") adivinar();
    });
}

// 🏁 terminar
function terminar(gano){
    estado.terminado = true;
    estado.gano = gano;
    localStorage.setItem("famosoEstado", JSON.stringify(estado));

    mostrarFinal(gano);
}

// 🎬 final
function mostrarFinal(gano){
    document.getElementById("game").innerHTML = `
        <h1>${gano ? "🎉 ¡Correcto!" : "⏰ Se acabó"}</h1>
        <h2>Era: ${data.nombre}</h2>
        <p>Volvé mañana</p>
    `;
}
</script>

</body>
</html>
