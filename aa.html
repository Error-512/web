<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Experimentos</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
}

/* HEADER */
.header{
margin-top:80px;
}

.header h1{
font-size:40px;
margin-bottom:10px;
}

.header p{
color:#888;
}

/* GRID (COMO ANTES) */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
gap:20px;
padding:40px;
max-width:800px;
margin:auto;
}

/* CARDS */
.card{
background:#1a1a1a;
border-radius:15px;
padding:25px;
cursor:pointer;
transition:0.25s;
border:1px solid #2a2a2a;
}

.card:hover{
transform:scale(1.05);
background:#222;
}

.card h2{
margin:0 0 10px;
font-size:22px;
}

.card p{
color:#aaa;
font-size:14px;
}

/* GAME VIEW */
.game{
display:none;
position:fixed;
inset:0;
background:#111;
flex-direction:column;
}

.topbar{
padding:15px;
background:#1a1a1a;
}

button{
padding:10px 20px;
background:#333;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#555;
}

iframe{
flex:1;
width:100%;
height:100%;
border:none;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
    <div class="header">
        <h1>...</h1>
        <p></p>
    </div>

    <div class="grid">
        <div class="card" onclick="openGame('Boludle.html')">
            <h2>Palabra diaria 🇦🇷</h2>
            <p></p>
        </div>

        <div class="card" onclick="openGame('juego2.html')">
            <h2>Juego 2</h2>
            <p>Próximamente</p>
        </div>

        <div class="card" onclick="openGame('juego3.html')">
            <h2>Juego 3</h2>
            <p>Próximamente</p>
        </div>
    </div>
</div>

<!-- GAME -->
<div id="gameView" class="game">
    <div class="topbar">
        <button onclick="closeGame()">← Volver</button>
    </div>

    <iframe id="frame"></iframe>
</div>

<script>
function openGame(src){
    document.getElementById("menu").style.display="none";
    document.getElementById("gameView").style.display="flex";
    document.getElementById("frame").src=src;
}

function closeGame(){
    document.getElementById("menu").style.display="block";
    document.getElementById("gameView").style.display="none";
    document.getElementById("frame").src="";
}
</script>

</body>
</html>
