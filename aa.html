<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Experimentos</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
}

/* HEADER */
.header {
    text-align: center;
    padding: 40px 20px 10px;
}

.header h1 {
    font-size: 40px;
    margin: 0;
}

.header p {
    color: #888;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 40px;
}

/* CARD */
.card {
    background: #1a1a1a;
    border-radius: 15px;
    padding: 25px;
    cursor: pointer;
    transition: 0.25s;
    border: 1px solid #2a2a2a;
}

.card:hover {
    transform: scale(1.05);
    background: #222;
}

.card h2 {
    margin: 0 0 10px;
    font-size: 22px;
}

.card p {
    color: #aaa;
    font-size: 14px;
}

/* GAME SCREEN */
.game {
    display: none;
    text-align: center;
    padding: 50px;
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    background: #333;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #555;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
    <div class="header">
        <h1>Mis Experimentos</h1>
        <p>como neal.fun pero tuyo 😎</p>
    </div>

    <div class="grid">
        <div class="card" onclick="openGame('game1')">
            <h2>¿Qué preferís?</h2>
            <p>Elegí entre dos opciones</p>
        </div>

        <div class="card" onclick="openGame('game2')">
            <h2>Contador infinito</h2>
            <p>Sumá sin parar</p>
        </div>

        <div class="card" onclick="openGame('game3')">
            <h2>Número random</h2>
            <p>Probá tu suerte</p>
        </div>
    </div>
</div>

<!-- GAME 1 -->
<div id="game1" class="game">
    <h1>¿Qué preferís?</h1>
    <button onclick="alert('Pizza 🍕')">Pizza</button>
    <button onclick="alert('Hamburguesa 🍔')">Hamburguesa</button>
    <br>
    <button onclick="goBack()">← Volver</button>
</div>

<!-- GAME 2 -->
<div id="game2" class="game">
    <h1>Contador</h1>
    <h2 id="count">0</h2>
    <button onclick="sum()">+1</button>
    <br>
    <button onclick="goBack()">← Volver</button>
</div>

<!-- GAME 3 -->
<div id="game3" class="game">
    <h1>Número random</h1>
    <h2 id="random">?</h2>
    <button onclick="randomNumber()">Generar</button>
    <br>
    <button onclick="goBack()">← Volver</button>
</div>

<script>
function openGame(id) {
    document.getElementById("menu").style.display = "none";
    document.getElementById(id).style.display = "block";
}

function goBack() {
    document.querySelectorAll(".game").forEach(g => g.style.display = "none");
    document.getElementById("menu").style.display = "block";
}

let c = 0;
function sum() {
    c++;
    document.getElementById("count").innerText = c;
}

function randomNumber() {
    document.getElementById("random").innerText = Math.floor(Math.random() * 100);
}
</script>

</body>
</html>
